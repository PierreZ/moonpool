name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run cargo clippy
        run: nix develop --command cargo clippy -- --deny warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run cargo fmt
        run: nix develop --command cargo fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run cargo nextest
        run: nix develop --command cargo nextest run

  # The simulation must stay buildable without the fork-based explorer (libc) so
  # it can compile to wasm. Guards the explorer-optional path + the wasm target.
  portability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Clippy (no exploration, all targets)
        run: nix develop --command cargo clippy -p moonpool-sim --no-default-features --all-targets -- --deny warnings
      - name: Tests (no exploration)
        run: nix develop --command cargo nextest run -p moonpool-sim --no-default-features
      - name: Build for wasm32-unknown-unknown
        run: |
          nix develop --command cargo check --target wasm32-unknown-unknown -p moonpool-assertions
          nix develop --command cargo check --target wasm32-unknown-unknown -p moonpool-sim --no-default-features
          nix develop --command cargo check --target wasm32-unknown-unknown -p moonpool-transport --no-default-features
      - name: Build without any rustflags (no tokio_unstable required)
        run: |
          # Issue #151 acceptance: a consumer on stable with no .cargo/config.toml
          # rustflags must be able to build every published crate.
          RUSTFLAGS="" nix develop --command cargo check -p moonpool-core -p moonpool-sim -p moonpool-transport
      - name: Lean production dependency tree excludes sim/explorer
        run: |
          tree=$(nix develop --command cargo tree -p moonpool --no-default-features --features tokio,transport -e no-dev)
          echo "$tree"
          if echo "$tree" | grep -qE "moonpool-sim|moonpool-explorer|moonpool-assertions"; then
            echo "::error::lean production build pulled in a sim/explorer crate"
            exit 1
          fi

  sim:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sim:
          - maze-explore
          - dungeon-explore
          - adaptive-explore
          - transport
          - axum-web
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Run simulation ${{ matrix.sim }}
        run: nix develop --command cargo xtask sim run ${{ matrix.sim }}

  # Build the full book (wasm demo + mdbook) on every PR/push. pages.yml only
  # deploys from main, so without this a wasm-bindgen drift or a broken demo/doc
  # lands on main before anyone notices. Mirrors pages.yml's build steps minus
  # the deploy.
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Build and stage the wasm demo embedded in the book
        run: nix develop --command book/build-wasm-demo.sh
      - name: Build book
        run: nix develop --command mdbook build
